site_name: Bridging Gaps in Heliospheric Radio Data Analyses
site_description: Lorentz Center workshop documentation, instrument catalogue, and resources.
site_url: https://lc-radio-workshop.github.io/
repo_url: https://github.com/LC-radio-workshop/LC-radio-workshop.github.io
repo_name: LC-radio-workshop/LC-radio-workshop.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/workshop_sticker.png
  favicon: assets/workshop_sticker.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - table-reader
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Instrument Catalogue: instruments.md
  - Existing Tools: existing-tools.md
  - Requirements: requirements.md
  - Examples: examples.md
  - User Notes: user-notes.md
  - Useful Links: useful-links.md
  - Team: team.md
  - Workshop:
      - Schedule: workshop/schedule.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LC-radio-workshop
      name: LC-radio-workshop on GitHub

extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/simple-datatables@9.0.3/dist/style.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/simple-datatables@9.0.3/dist/umd/simple-datatables.js
  - javascripts/instruments-table.js
